<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ComSoc Borlase</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: sans-serif;
    background-color: #0b2f4f;
    color: white;
    display: grid;
    grid-template-columns: 1fr 70px; /* main content | sidebar */
    min-height: 100vh;
  }

  .main {
    padding: 40px;
    display: flex;
    flex-direction: column;
  }

  header {
    background: rgba(0,0,0,0.3);
    display: inline-block;
    padding: 15px 25px;
    align-self: flex-start;
    border-radius: 4px;
  }
  header h1 {
    color: #4be0d1;
    border-bottom: 2px solid #4be0d1;
    margin: 0 0 5px 0;
  }
  header p { margin: 0; color: #cde; }

  .tagline { margin-top: 40px; font-size: 1.4rem; }

  .news-btn {
    margin-top: 15px;
    align-self: flex-start;
    background: transparent;
    border: 2px solid #7fd8ff;
    color: #7fd8ff;
    padding: 12px 20px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: bold;
  }

  .join-section {
    text-align: center;
    margin: 100px auto 0;
  }
  .join-btn {
    display: inline-block;
    background: #2a9fd6;
    border: 2px solid #7fd8ff;
    color: white;
    font-size: 1.8rem;
    font-weight: bold;
    padding: 20px 60px;
    border-radius: 4px;
    text-decoration: none;
  }
  .join-section p { margin-top: 10px; color: #cde; }

  .past-events {
    margin-top: auto;
    padding-top: 60px;
  }
  .past-events h2 {
    text-decoration: underline;
    font-weight: normal;
  }
  .event-row {
    display: flex;
    gap: 20px;
    margin-top: 20px;
  }
  .event-card {
    flex: 1;
    height: 40px;
    background: blue;
  }

  /* Sidebar nav */
  nav.sidebar {
    grid-column: 2;
    background: rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px 0;
    gap: 12px;
  }
  nav.sidebar a {
    color: #7fd8ff;
    text-decoration: none;
    font-size: 1.3rem;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
  }
  nav.sidebar a:hover { background: rgba(255,255,255,0.1); }
</style>
</head>
<body style="background-image: url('seaaqua.avif'); background-size: cover; background-position: center; background-color: lightgray; background-blend-mode: multiply; padding: 20px; border-radius: 5px; min-height: 90vh; display: flex; flex-direction: column; align-items: center;">
<body>

  <div class="main">
    <header>
      <h1>ComSoc Borlase +</h1>
      <p>H3 every Wednesday Break</p>
    </header>

    <p class="tagline">We do computing activities every week!</p>
    <a href="news.html" class="news-btn">ComSoc News/Events!</a>

    <div class="join-section">
      <a href="join.html" class="join-btn">Join Us!</a>
      <p>Students only!</p>
    </div>

    <div class="past-events">
      <h2>Past events</h2>
      <div class="event-row">
        <div class="event-card"></div>
        <div class="event-card"></div>
        <div class="event-card"></div>
      </div>
    </div>
  </div>

  <nav class="sidebar">
    <a href="index.html">🏠</a>
    <a href="about/about.html">ℹ️</a>
    <a href="gallery/gallery.html">▦</a>
    <a href="ask.html">❓</a>
    <a href="minigame.html">✦</a>
  </nav>

</body>
</html>
