<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ComSoc Borlase</title>
<style>
  * { 
    box-sizing: border-box; 
  }

  body {
    /* Combined Background Properties */
    background-image: url('seaaqua.avif'); 
    background-repeat: no-repeat; 
    background-position: center; 
    background-size: cover; 
    background-attachment: fixed; 
    background-color: #0b2f4f; /* Fallback color */
    
    /* Layout Properties */
    margin: 0;
    font-family: sans-serif;
    color: white;
    display: grid;
    grid-template-columns: 1fr 70px; /* main content | sidebar */
    min-height: 100vh;
  }

  .main {
    padding: 40px;
    display: flex;
    flex-direction: column;
  }

  header {
    background: rgba(0,0,0,0.5); /* Made slightly darker for contrast */
    display: inline-block;
    padding: 15px 25px;
    align-self: flex-start;
    border-radius: 4px;
  }
  header h1 {
    color: #4be0d1;
    border-bottom: 2px solid #4be0d1;
    margin: 0 0 5px 0;
  }
  header p { margin: 0; color: #cde; }

  /* Changed color to white for better readability against the background */
  .tagline { 
    margin-top: 40px; 
    font-size: 1.4rem; 
    color: white; 
  }

  .news-btn {
    margin-top: 15px;
    align-self: flex-start;
    background: transparent;
    border: 2px solid #7fd8ff;
    color: #7fd8ff;
    padding: 12px 20px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: bold;
  }

  .join-section {
    text-align: center;
    margin: 100px auto 0;
  }
  .join-btn {
    display: inline-block;
    background: #2a9fd6;
    border: 2px solid #7fd8ff;
    color: white;
    font-size: 1.8rem;
    font-weight: bold;
    padding: 20px 60px;
    border-radius: 4px;
    text-decoration: none;
  }
  .join-section p { margin-top: 10px; color: #cde; }

  .past-events {
    margin-top: auto;
    padding-top: 60px;
  }
  /* Changed color to white for visibility */
  .past-events h2 {
    text-decoration: underline;
    font-weight: normal;
    color: white; 
  }
  .event-row {
    display: flex;
    gap: 20px;
    margin-top: 20px;
  }
  .event-card {
    flex: 1;
    height: 40px;
    background: blue;
  }

  /* Sidebar nav */
  nav.sidebar {
    grid-column: 2;
    background: rgba(0,0,0,0.4); /* Made darker for better visibility */
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px 0;
    gap: 12px;
  }
  nav.sidebar a {
    color: #7fd8ff;
    text-decoration: none;
    font-size: 1.3rem;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
  }
  nav.sidebar a:hover { background: rgba(255,255,255,0.1); }
</style>

</head>


 <body>
 <div class="main">
    <!-- 1. Added a semi-transparent dark background, padding, and rounded corners to the header box -->
    <header style="background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 8px; display: inline-block;">
      <h1 style="color: #ffffff;" margin: 0 0 5px 0;">ComSoc Borlase +</h1>
      <p style="color: #e0e0e0;" margin: 0;">H3 every Wednesday Break</p>
    </header>

   <!-- 2. Changed tagline text to White so it stands out against the dark blue water -->
   <header style="background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 8px; display: inline-block;">
  <p style="font-weight: bold; color: #ffffff;" font-family: Verdana, sans-serif; class="tagline">We do computing activities every week!</p>
   </header>
   <!-- 3. Changed news link to Bright Amber Gold for a clean, visible accent -->
   <header style="background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 8px; display: inline-block;">
  <a href="news.html" target="_blank" class="news-btn" style="font-weight: 800; font-size: 20px; color: #ffffff;" font-family: Verdana, sans-serif;text-decoration: none;">ComSoc News/Events!</a>
   </header>
    <div class="join-section" style="margin-top: 20px;">
      <!-- 4. Turned "Join Us!" into a solid Coral button with dark text so it instantly pops -->
      <a href="join.html" class="join-btn" style="font-weight: bold; color: #1a1a24;" font-family: Verdana, sans-serif; background-color: #FF6B4A; padding: 10px 20px; border-radius: 5px; text-decoration: none; display: inline-block; margin-bottom: 5px;">Join Us!</a>
      <p style="font-weight: bold; color: #ffffff;" font-family: Verdana, sans-serif; margin: 0;">Students only!</p>
    </div>

    <div class="past-events" style="margin-top: 30px;">
     <!-- 5. Changed Heading to White -->
     <h2 style="font-weight: bold; color: #ffffff;" font-family: Verdana, sans-serif;">Past events</h2>
      <div class="event-row">
        <div class="event-card"></div>
        <div class="event-card"></div>
        <div class="event-card"></div>
      </div>
    </div>
  </div>

  <nav class="sidebar">
    <a href="index.html">🏠</a>
    <a href="about/about.html">ℹ️</a>
    <a href="gallery/gallery.html">▦</a>
    <a href="ask.html">❓</a>
    <a href="minigame.html">✦</a>
  </nav>

</body>
</html>
