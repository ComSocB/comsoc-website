<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ComSoc Borlase</title>
<style>
  * { 
    box-sizing: border-box; 
  }

  body {
    /* Combined Background Properties */
    background-image: url('seaaqua.avif'); 
    background-repeat: no-repeat; 
    background-position: center; 
    background-size: cover; 
    background-attachment: fixed; 
    background-color: #0b2f4f; /* Fallback color */
    
    /* Layout Properties */
    margin: 0;
    font-family: sans-serif;
    color: white;
    display: grid;
    grid-template-columns: 1fr 70px; /* main content | sidebar */
    min-height: 100vh;
  }

  .main {
    padding: 40px;
    display: flex;
    flex-direction: column;
  }

  header {
    background: rgba(0,0,0,0.5); /* Made slightly darker for contrast */
    display: inline-block;
    padding: 15px 25px;
    align-self: flex-start;
    border-radius: 4px;
  }
  header h1 {
    color: #4be0d1;
    border-bottom: 2px solid #4be0d1;
    margin: 0 0 5px 0;
  }
  header p { margin: 0; color: #cde; }

  /* Changed color to white for better readability against the background */
  .tagline { 
    margin-top: 40px; 
    font-size: 1.4rem; 
    color: white; 
  }

  .news-btn {
    margin-top: 15px;
    align-self: flex-start;
    background: transparent;
    border: 2px solid #7fd8ff;
    color: #7fd8ff;
    padding: 12px 20px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: bold;
  }

  .join-section {
    text-align: center;
    margin: 100px auto 0;
  }
  .join-btn {
    display: inline-block;
    background: #2a9fd6;
    border: 2px solid #7fd8ff;
    color: white;
    font-size: 1.8rem;
    font-weight: bold;
    padding: 20px 60px;
    border-radius: 4px;
    text-decoration: none;
  }
  .join-section p { margin-top: 10px; color: #cde; }

  .past-events {
    margin-top: auto;
    padding-top: 60px;
  }
  /* Changed color to white for visibility */
  .past-events h2 {
    text-decoration: underline;
    font-weight: normal;
    color: white; 
  }
  .event-row {
    display: flex;
    gap: 20px;
    margin-top: 20px;
  }
  .event-card {
    flex: 1;
    height: 40px;
    background: blue;
  }

  /* Sidebar nav */
  nav.sidebar {
    grid-column: 2;
    background: rgba(0,0,0,0.4); /* Made darker for better visibility */
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 15px 0;
    gap: 12px;
  }
  nav.sidebar a {
    color: #7fd8ff;
    text-decoration: none;
    font-size: 1.3rem;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
  }
  nav.sidebar a:hover { background: rgba(255,255,255,0.1); }
</style>

</head>


 <body>
  <div class="main" style="font-family: Verdana, sans-serif; padding: 20px;">
    
    <!-- One clean, unified card container for all header info -->
    <div style="background: rgba(0, 0, 0, 0.55); backdrop-filter: blur(8px); padding: 25px; border-radius: 12px; display: inline-block; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
      
      <header>
        <h1 style="color: #0ae0f0; margin: 0 0 5px 0; font-size: 28px;">ComSoc Borlase +</h1>
        <p style="color: #0ae0f0; margin: 0 0 20px 0; font-size: 14px; opacity: 0.9;">H3 every Wednesday Break</p>
      </header>

      <p class="tagline" style="font-weight: bold; color: #0ae0f0; margin: 0 0 15px 0; font-size: 16px; line-height: 1.4;">We do computing activities every week!</p>
      
      <a href="news.html" target="_blank" class="news-btn" style="font-weight: 700; font-size: 16px; color: #0ae0f0; text-decoration: none; display: inline-block; margin-bottom: 5px;">ComSoc News/Events!</a>
    
    </div>

    <!-- Interactive Join section spaced cleanly below -->
    <div class="join-section" style="margin-top: 25px;">
      <a href="join.html" class="join-btn" style="font-weight: bold; color: #0ae0f0; background-color: #FF6B4A; padding: 12px 24px; border-radius: 6px; text-decoration: none; display: inline-block; margin-bottom: 8px; box-shadow: 0 4px 10px rgba(255,107,74,0.3);">Join Us!</a>
      <p style="font-weight: bold; color: #0ae0f0; margin: 0; font-size: 14px; text-shadow: 1px 1px 4px rgba(0,0,0,0.6);">Students only!</p>
    </div>

    <!-- Past events section -->
    <div class="past-events" style="margin-top: 40px;">
     <h2 style="font-weight: bold; color: #0ae0f0; text-shadow: 1px 1px 4px rgba(0,0,0,0.6); margin-bottom: 15px;">Past events</h2>
      <div class="event-row">
        <div class="event-card"></div>
        <div class="event-card"></div>
        <div class="event-card"></div>
      </div>
    </div>
  </div>

  <nav class="sidebar">
    <a href="index.html">🏠</a>
    <a href="about/about.html">ℹ️</a>
    <a href="gallery/gallery.html">▦</a>
    <a href="ask.html">❓</a>
    <a href="minigame.html">✦</a>
  </nav>

</body>
</html>
