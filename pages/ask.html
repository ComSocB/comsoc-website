<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComSoc - Ask COMET!</title>
    <link rel="icon" type="image/png" href="ComSoc.png">
</head>
    
 <style>
  * { 
    box-sizing: border-box; 
  }

  body {
    /* Combined Background Properties */
    background-image: url('seaaqua.avif'); 
    background-repeat: no-repeat; 
    background-position: center; 
    background-size: cover; 
    background-attachment: fixed; 
    background-color: #0b2f4f; /* Fallback color */
    
    /* Layout Properties */
    margin: 0;
    font-family: sans-serif;
    color: white;
    display: grid;
    grid-template-columns: 1fr 70px; /* main content | sidebar */
    min-height: 100vh;
  }

  .main {
    padding: 40px;
    display: flex;
    flex-direction: column;
  }

  header {
    background: rgba(0,0,0,0.5); /* Made slightly darker for contrast */
    display: inline-block;
    padding: 15px 25px;
    align-self: flex-start;
    border-radius: 4px;
  }
  header h1 {
    color: #4be0d1;
    border-bottom: 2px solid #4be0d1;
    margin: 0 0 5px 0;
  }
  header p { margin: 0; color: #cde; }

  /* Changed color to white for better readability against the background */
  .tagline { 
    margin-top: 40px; 
    font-size: 1.4rem; 
    color: white; 
  }
  </style>
    <body>
          <a href="main.html">X</a>
  <div class="main" style="font-family: Verdana, sans-serif; padding: 20px;">
    
    <!-- One clean, unified card container for all header info -->
    <div style="background: rgba(0, 0, 0, 0.55); backdrop-filter: blur(8px); padding: 25px; border-radius: 12px; display: inline-block; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
      
      <header>
        <h1 style="color: #0ae0f0; margin: 0 0 5px 0; font-size: 28px;">Comet : Ask me anything!</h1>
        <p style="color: #0ae0f0; margin: 0 0 20px 0; font-size: 14px; opacity: 0.9;">Got any of these questions? Click to find out!</p>
      </header>
    
    </div>
      
</body>
</html>
