 <style>
  * { 
    box-sizing: border-box; 
  }

  body {

    background-position: center; 
    background-size: cover; 
    background-attachment: fixed;

    display: grid;
    grid-template-columns: 1fr 70px; /* main content | sidebar */
    min-height: 100vh;
  }

  .main {
    padding: 40px;

    flex-direction: column;
  }

  }

    color: #4be0d1;

    margin: 0 0 5px 0;
  }
  header p { margin: 0; color: #cde; }

    color: white;
